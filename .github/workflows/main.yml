name: tests
on:
    pull_request:
        branches: [main]
jobs:
    Integration-tests:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                branch:
                    - ${{ github.head_ref }}
                    - 'main'

        permissions:
            contents: read
            pull-requests: write

        steps:
            - uses: actions/checkout@v4
              with:
                  ref: ${{ matrix.branch }}
            - name: Use Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20.x'
            - uses: pnpm/action-setup@v4
              name: Install pnpm
              with:
                  version: 8
                  run_install: false
            - name: Install dependencies
              run: pnpm install
            - name: Build
              run: pnpm build
            - name: Tests
              run: pnpm run vitest
            - name: 'Upload Coverage'
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-${{ matrix.branch }}
                  path: coverage

    report-coverage:
        needs: Integration-tests
        runs-on: ubuntu-latest
        steps:
            - name: 'Download Coverage Artifacts'
              uses: actions/download-artifact@v4
              with:
                  name: coverage-${{ github.head_ref }}
                  path: coverage
            - uses: actions/download-artifact@v4
              with:
                  name: coverage-main
                  path: coverage-main
            - name: 'Main coverage'
              if: always()
              uses: davelosert/vitest-coverage-report-action@v2
              with:
                  name: 'Main coverage'
                  json-summary-path: './coverage-main/coverage-summary-frontend.json'
                  json-final-path: './coverage-main/coverage-final-frontend.json'
            - name: 'Head coverage'
              if: always()
              uses: davelosert/vitest-coverage-report-action@v2
              with:
                  name: 'Coverage ${{ github.head_ref }}'
                  json-summary-path: './coverage-${{ github.head_ref }}/coverage-summary-frontend.json'
                  json-final-path: './coverage-${{ github.head_ref }}/coverage-final-frontend.json'
